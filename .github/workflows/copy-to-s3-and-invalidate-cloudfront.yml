name: Copy website to S3 and invalidate CloudFront Distribution

on:
  push:
    branches:
      - main

jobs:
  copy-website-to-s3-and-invalidate-cloudfront:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Update sitemap lastmod to today's date
      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml

      # Minify HTML, CSS, and JS
      - name: Minify HTML, CSS, and JS files
        run: |
          npm install html-minifier-terser clean-css-cli terser --no-save
          # Minify HTML
          find . -name "*.html" -exec npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
          # Minify CSS
          find assets/css -name "*.css" -exec sh -c 'npx cleancss -o "$0" "$0"' {} \;
          # Minify JS
          find assets/js -name "*.js" -exec sh -c 'npx terser "$0" -o "$0"' {} \;

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Sync to S3 with per-type cache headers
      - name: Sync files to S3
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          # Versioned CSS/JS — 1-year immutable cache (cache-busted via ?v= query string)
          aws s3 sync assets/ "s3://${BUCKET}/assets/" \
            --follow-symlinks \
            --cache-control "public, max-age=31536000, immutable"

          # Images — 30-day cache
          aws s3 sync images/ "s3://${BUCKET}/images/" \
            --follow-symlinks \
            --cache-control "public, max-age=2592000"

          # HTML, sitemap, manifest and everything else — must-revalidate
          aws s3 sync . "s3://${BUCKET}/" \
            --follow-symlinks --delete \
            --exclude ".git/*" --exclude "node_modules/*" \
            --exclude "resume/*" --exclude "*.py" \
            --exclude "assets/*" --exclude "images/*" \
            --cache-control "public, max-age=0, must-revalidate"

  invalidate-cloudfront-distribution:
    needs: copy-website-to-s3-and-invalidate-cloudfront
    runs-on: ubuntu-latest
    steps:
      # Invalidate CloudFront Distribution
      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.DISTRIBUTION }}
          PATHS: "/*"
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
